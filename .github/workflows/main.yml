name: Comprehensive Maven Testing

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'  # Daily build at 2 AM

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Verify Maven version
      run: mvn --version
    
    - name: Build with Maven
      run: mvn clean compile
    
    - name: Run tests with coverage
      run: mvn test
      
    - name: Generate test report
      run: |
        echo "## Test Results" > test-summary.md
        echo "" >> test-summary.md
        echo "Tests completed at $(date)" >> test-summary.md
        echo "" >> test-summary.md
        if [ -f target/surefire-reports/TEST-*.xml ]; then
          echo "### Test Details" >> test-summary.md
          grep -l "failures=\"0\"" target/surefire-reports/TEST-*.xml || echo " Some tests failed!" >> test-summary.md
        else
          echo "No test reports found" >> test-summary.md
        fi
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: |
          target/surefire-reports/
          test-summary.md
        retention-days: 30
    
    - name: Fail if tests failed
      if: failure()
      run: |
        echo "Tests failed. Check the test reports above."
        exit 1
